{{ define "main" }}

{{/*  title  */}}
<div class="lg:w-5/12 md:w-7/12 w-11/12 mx-auto mb-24">
    <h1 class="text-4xl font-normal">{{ .Type | title }}</h1>
</div>

{{/*  content  */}}
<div class="w-11/12 md:w-10/12 3xl:w-9/12 mx-auto">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-y-10 gap-x-18">
        {{ range .Pages.ByPublishDate.Reverse }}
            {{ partial "components/project_card.html" . }}
        {{ end }}
    </div>
</div>

{{ end }}
