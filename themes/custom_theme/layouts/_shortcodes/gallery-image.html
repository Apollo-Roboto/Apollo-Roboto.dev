{{ $src := .Get "src" | .Page.Resources.Get }}
{{ $alt := .Get "alt" }}
{{ with $src }}
<img title="{{ $alt }}" alt="{{ $alt }}" src="{{ $src }}" loading="lazy" class="" />
{{ else }}
<svg class="w-full block" viewBox="0 0 100 100" preserveAspectRatio="none" stroke="#171717" stroke-width="1">
    <path d="M 0,0 L 100,100 M 0,100 L 100,0" vector-effect="non-scaling-stroke" />
    <circle cx="50" cy="50" r="50" fill="none" vector-effect="non-scaling-stroke" />
</svg>
{{ end }}
