{{ if .IsPage }} {{/* only show if it's a page */}}

<p>
	<i data-feather="calendar"></i>
	<time>{{ .PublishDate | time.Format ":date_full" }}</time>
	{{ end }}

	<br/>

	{{ with .Params.tags }}
	<i data-feather="tag"></i>
	{{ range . }}
	{{ $href := print (absURL "tags/") (urlize .) }}
	<a href="{{ $href }}">{{ . }}</a>
	{{ end }}
</p>

{{ end }}
