
<div class="bg-neutral-900 text-white grid place-items-center">

	{{/*  Pride flag  */}}
	{{ if .Site.Params.pride }}
		<div class="bg-red-600 h-1 min-w-full"></div>
		<div class="bg-orange-600 h-1 min-w-full"></div>
		<div class="bg-yellow-600 h-1 min-w-full"></div>
		<div class="bg-green-600 h-1 min-w-full"></div>
		<div class="bg-blue-600 h-1 min-w-full"></div>
		<div class="bg-purple-600 h-1 min-w-full"></div>
		<div class="h-8"></div>
	{{ else }}
		<div class="h-14"></div>
	{{ end }}

	<a href="https://github.com/Apollo-Roboto">
		<!-- <img src="/images/GitHub/Logo_White.png" alt="" class="w-20"/> -->
		<img src="/images/GitHub/Mark-Light-120px-plus.png" alt="" class="w-14"/>
	</a>

	{{/*  Spacer  */}}
	<div class="h-10"></div>

	<p class="text-xs">Copyright &#xA9 {{ now.UTC.Year }} | {{ .Site.Copyright}}</p>

	{{/*  Spacer  */}}
	<div class="h-10"></div>

	<p class="text-xs text-gray-500">
		Powered by
		<a class="hover:underline" href="https://pages.github.com/">Github Pages</a>, 
		<a class="hover:underline" href="https://gohugo.io/">Hugo</a> and
		<a class="hover:underline" href="https://tailwindcss.com/">Tailwindcss</a>
	</p>
	
	{{/*  Spacer  */}}
	<div class="h-4"></div>

</div>
